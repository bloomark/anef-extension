name: Refresh Stats Data

on:
  schedule:
    - cron: '0 7-15 * * *'  # Peak: every hour 9h-17h Paris (été UTC+2)
    - cron: '0 5,20 * * *'  # Off-peak: 7h, 22h Paris
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch snapshots from Supabase
        run: node scripts/fetch-snapshots.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Inject Supabase credentials
        run: |
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" docs/shared/data.js
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" docs/shared/data.js

      - name: Verify no remaining tokens
        run: |
          if grep -q '__SUPABASE_URL__\|__SUPABASE_ANON_KEY__' docs/shared/data.js; then
            echo "::error::Supabase tokens not replaced."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
